<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Centaur Run</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { display: block; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<script>
const GAME_W = 960;
const GAME_H = 540;
// The dirt path in the background image is at ~y=1280-1400 out of 1536
// Scaled to game: 1300 * (540/1536) ≈ 457
const GROUND_Y = 500;
const GRAVITY = 1800;
const JUMP_VELOCITY = -720;
const BASE_SCROLL = 4;

class GameScene extends Phaser.Scene {
    constructor() {
        super('game');
        this.score = 0;
        this.isGameOver = false;
    }

    preload() {
        this.load.atlas('centaur', '../assets/spritesheet.png', '../assets/spritesheet.json');
        this.load.image('bg', '../assets/background.png');
        this.load.image('obs_boulder', '../assets/obs_boulder.png');
        this.load.image('obs_logpile', '../assets/obs_logpile.png');
        this.load.image('obs_log', '../assets/obs_log.png');
        this.load.image('obs_mossylog', '../assets/obs_mossylog.png');
    }

    create() {
        // Full background as endless scroll
        // The bg image is 2816x1536. We need it to fill 960x540 and tile horizontally.
        // tileSprite uses texture pixels for tilePosition, so we scale accordingly.
        const bgTex = this.textures.get('bg').getSourceImage();
        this.bgNativeW = bgTex.width;   // 2816
        this.bgNativeH = bgTex.height;  // 1536
        this.bgScaleX = GAME_W / this.bgNativeW;  // how much we're shrinking
        this.bgScaleY = GAME_H / this.bgNativeH;

        this.bg = this.add.tileSprite(0, 0, this.bgNativeW, this.bgNativeH, 'bg')
            .setOrigin(0, 0)
            .setDisplaySize(GAME_W, GAME_H);

        // Animations
        const runFrames = [];
        for (let i = 0; i <= 7; i++) {
            runFrames.push({ key: 'centaur', frame: `frame_${String(i).padStart(3, '0')}` });
        }
        this.anims.create({ key: 'run', frames: runFrames, frameRate: 12, repeat: -1 });

        const jumpFrames = [];
        for (let i = 8; i <= 13; i++) {
            jumpFrames.push({ key: 'centaur', frame: `frame_${String(i).padStart(3, '0')}` });
        }
        this.anims.create({ key: 'jump', frames: jumpFrames, frameRate: 10, repeat: 0 });

        // Centaur - origin at bottom-center of the sprite content
        this.centaur = this.add.sprite(180, GROUND_Y, 'centaur', 'frame_000');
        this.centaur.setScale(0.28);
        this.centaur.setOrigin(0.45, 0.85);
        this.centaur.play('run');

        this.centaurVelocityY = 0;
        this.centaurY = GROUND_Y;
        this.isJumping = false;

        // Obstacles
        this.obstacles = [];
        this.nextObstacleTime = 2500;

        // Obstacle types with their sprite keys and hitbox sizes
        this.obstacleTypes = [
            { key: 'obs_boulder', scale: 0.25, hitW: 50, hitH: 45 },
            { key: 'obs_logpile', scale: 0.30, hitW: 50, hitH: 45 },
            { key: 'obs_log', scale: 0.25, hitW: 60, hitH: 30 },
            { key: 'obs_mossylog', scale: 0.25, hitW: 55, hitH: 30 },
        ];

        // Dust particles
        this.dustParticles = [];

        // Score
        this.scoreText = this.add.text(GAME_W - 16, 16, 'Score: 0', {
            fontSize: '24px', fontFamily: 'Georgia, serif', color: '#ffffff',
            fontStyle: 'bold', stroke: '#000000', strokeThickness: 3
        }).setOrigin(1, 0);

        this.speedMultiplier = 1;

        // Instructions
        this.instructionText = this.add.text(GAME_W / 2, GAME_H / 2 - 80,
            'SPACE or CLICK to Jump!', {
            fontSize: '28px', fontFamily: 'Georgia, serif', color: '#ffffff',
            fontStyle: 'bold', stroke: '#000000', strokeThickness: 4, align: 'center'
        }).setOrigin(0.5).setAlpha(0.9);

        this.time.delayedCall(2500, () => {
            this.tweens.add({ targets: this.instructionText, alpha: 0, duration: 600 });
        });

        // Input
        this.spaceBar = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        this.upKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP);
        this.input.on('pointerdown', () => this.jump());

        this.gameOverGroup = this.add.group();
    }

    jump() {
        if (this.isGameOver) { this.restartGame(); return; }
        if (!this.isJumping) {
            this.isJumping = true;
            this.centaurVelocityY = JUMP_VELOCITY;
            this.centaur.play('jump');
            this.spawnDust(this.centaur.x - 20, GROUND_Y, 6);
        }
    }

    spawnDust(x, y, count) {
        for (let i = 0; i < count; i++) {
            const dust = this.add.circle(
                x + (Math.random() - 0.5) * 30, y + Math.random() * 8,
                2 + Math.random() * 4, 0xC4A882, 0.5
            );
            dust.vx = -1 - Math.random() * 2;
            dust.vy = -Math.random() * 1.5;
            dust.life = 25 + Math.random() * 20;
            this.dustParticles.push(dust);
        }
    }

    spawnObstacle() {
        const t = Phaser.Utils.Array.GetRandom(this.obstacleTypes);
        const obs = this.add.image(GAME_W + 80, GROUND_Y, t.key);
        obs.setScale(t.scale);
        obs.setOrigin(0.5, 1); // bottom-center aligned to ground
        obs.hitW = t.hitW;
        obs.hitH = t.hitH;
        obs.scored = false;
        this.obstacles.push(obs);
    }

    restartGame() {
        this.isGameOver = false;
        this.score = 0;
        this.speedMultiplier = 1;
        this.scoreText.setText('Score: 0');
        this.obstacles.forEach(o => o.destroy());
        this.obstacles = [];
        this.dustParticles.forEach(d => d.destroy());
        this.dustParticles = [];
        this.gameOverGroup.clear(true, true);
        this.centaur.setAlpha(1);
        this.centaurY = GROUND_Y;
        this.centaurVelocityY = 0;
        this.isJumping = false;
        this.centaur.play('run');
        this.centaur.y = GROUND_Y;
        this.nextObstacleTime = 0;
    }

    update(time, delta) {
        const dt = delta / 1000;
        const speed = BASE_SCROLL * this.speedMultiplier;

        // Scroll background (convert game-speed to texture-pixel-speed)
        this.bg.tilePositionX += speed / this.bgScaleX;

        if (this.isGameOver) {
            this.speedMultiplier = Math.max(0, this.speedMultiplier - dt * 2);
            return;
        }

        // Input
        if (Phaser.Input.Keyboard.JustDown(this.spaceBar) || Phaser.Input.Keyboard.JustDown(this.upKey)) {
            this.jump();
        }

        this.speedMultiplier = 1 + this.score * 0.04;

        // Centaur physics
        if (this.isJumping) {
            this.centaurVelocityY += GRAVITY * dt;
            this.centaurY += this.centaurVelocityY * dt;
            if (this.centaurY >= GROUND_Y) {
                this.centaurY = GROUND_Y;
                this.centaurVelocityY = 0;
                this.isJumping = false;
                this.centaur.play('run');
                this.spawnDust(this.centaur.x, GROUND_Y, 8);
            }
        } else if (Math.random() < 0.1) {
            this.spawnDust(this.centaur.x - 30, GROUND_Y + 2, 1);
        }
        this.centaur.y = this.centaurY;

        // Dust
        for (let i = this.dustParticles.length - 1; i >= 0; i--) {
            const d = this.dustParticles[i];
            d.x += d.vx; d.y += d.vy; d.life--;
            d.alpha = d.life / 45;
            if (d.life <= 0) { d.destroy(); this.dustParticles.splice(i, 1); }
        }

        // Obstacles
        if (time > this.nextObstacleTime) {
            this.spawnObstacle();
            this.nextObstacleTime = time + (1400 + Math.random() * 1600) / this.speedMultiplier;
        }

        for (let i = this.obstacles.length - 1; i >= 0; i--) {
            const obs = this.obstacles[i];
            obs.x -= speed;

            if (!obs.scored && obs.x < this.centaur.x - 40) {
                obs.scored = true;
                this.score++;
                this.scoreText.setText(`Score: ${this.score}`);
            }

            // Collision - tight inner hitbox on the centaur body only
            // The sprite is wide (horse body + flowing hair) but the
            // collidable core is just the torso/legs area
            const cL = this.centaur.x - 10, cR = this.centaur.x + 15;
            const cT = this.centaurY - 70, cB = this.centaurY - 5;
            const oL = obs.x - obs.hitW * 0.35, oR = obs.x + obs.hitW * 0.35;
            const oT = GROUND_Y - obs.hitH * 0.8, oB = GROUND_Y;

            if (cR > oL && cL < oR && cB > oT && cT < oB) this.gameOver();
            if (obs.x < -100) { obs.destroy(); this.obstacles.splice(i, 1); }
        }
    }

    gameOver() {
        this.isGameOver = true;
        this.centaur.stop();
        this.centaur.setAlpha(0.6);

        const overlay = this.add.rectangle(GAME_W/2, GAME_H/2, GAME_W, GAME_H, 0x000000, 0.4);
        const panel = this.add.rectangle(GAME_W/2, GAME_H/2, 320, 200, 0x1a1a2e, 0.9)
            .setStrokeStyle(2, 0xC4A882);
        const t1 = this.add.text(GAME_W/2, GAME_H/2 - 50, 'GAME OVER', {
            fontSize: '36px', fontFamily: 'Georgia, serif', color: '#C4A882', fontStyle: 'bold'
        }).setOrigin(0.5);
        const t2 = this.add.text(GAME_W/2, GAME_H/2, `Score: ${this.score}`, {
            fontSize: '28px', fontFamily: 'Georgia, serif', color: '#ffffff'
        }).setOrigin(0.5);
        const t3 = this.add.text(GAME_W/2, GAME_H/2 + 50, 'Click or SPACE to restart', {
            fontSize: '16px', fontFamily: 'Georgia, serif', color: '#999999'
        }).setOrigin(0.5);

        this.gameOverGroup.addMultiple([overlay, panel, t1, t2, t3]);
    }
}

new Phaser.Game({
    type: Phaser.AUTO,
    width: GAME_W,
    height: GAME_H,
    backgroundColor: '#87CEEB',
    scene: GameScene,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
});
</script>
</body>
</html>
