<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <title>Centaur Run</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #1a1a2e;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            top: 0; left: 0;
        }
        canvas { display: block; }
        #rotate-msg {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #1a1a2e;
            color: #C4A882;
            font-family: Georgia, serif;
            font-size: 22px;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }
        #rotate-msg .icon { font-size: 60px; margin-bottom: 20px; }
        @media (orientation: portrait) and (max-width: 768px) {
            #rotate-msg { display: flex; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
    <div id="rotate-msg">
        <div class="icon">&#x21BB;</div>
        <div>Rotate your device to landscape to play!</div>
    </div>
<script>
// Prevent pull-to-refresh and bounce scrolling
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());

const GAME_W = 960;
const GAME_H = 540;
const GROUND_Y = 500;
const GRAVITY = 1800;
const JUMP_VELOCITY_MIN = -580;  // short tap
const JUMP_VELOCITY_MAX = -780;  // full hold
const HOLD_TIME_FOR_MAX = 180;   // ms to reach max jump
const BASE_SCROLL = 4;

class GameScene extends Phaser.Scene {
    constructor() {
        super('game');
        this.score = 0;
        this.highScore = parseInt(localStorage.getItem('centaur_hs') || '0');
        this.isGameOver = false;
    }

    preload() {
        // Loading bar for mobile
        const bar = this.add.graphics();
        this.load.on('progress', p => {
            bar.clear();
            bar.fillStyle(0xC4A882, 1);
            bar.fillRect(GAME_W * 0.2, GAME_H / 2 - 10, GAME_W * 0.6 * p, 20);
            bar.lineStyle(2, 0xC4A882);
            bar.strokeRect(GAME_W * 0.2, GAME_H / 2 - 10, GAME_W * 0.6, 20);
        });
        this.load.on('complete', () => bar.destroy());

        this.load.atlas('centaur', 'assets/spritesheet.png', 'assets/spritesheet.json');
        this.load.image('bg', 'assets/background.png');
        this.load.image('obs_boulder', 'assets/obs_boulder.png');
        this.load.image('obs_logpile', 'assets/obs_logpile.png');
        this.load.image('obs_log', 'assets/obs_log.png');
        this.load.image('obs_mossylog', 'assets/obs_mossylog.png');
        this.load.image('obs_fence', 'assets/obs_fence.png');
        this.load.image('obs_fence_broken', 'assets/obs_fence_broken.png');
        this.load.audio('music', 'assets/music.mp3');
        this.load.audio('sfx_jump', 'assets/jump.mp3');
        this.load.audio('sfx_gameover', 'assets/gameover.mp3');
        this.load.audio('sfx_impact', 'assets/impact.mp3');
    }

    create() {
        // Background
        const bgTex = this.textures.get('bg').getSourceImage();
        this.bgNativeW = bgTex.width;
        this.bgNativeH = bgTex.height;
        this.bgScaleX = GAME_W / this.bgNativeW;

        this.bg = this.add.tileSprite(0, 0, this.bgNativeW, this.bgNativeH, 'bg')
            .setOrigin(0, 0)
            .setDisplaySize(GAME_W, GAME_H);

        // Animations
        const runFrames = [];
        for (let i = 0; i <= 7; i++) {
            runFrames.push({ key: 'centaur', frame: `frame_${String(i).padStart(3, '0')}` });
        }
        this.anims.create({ key: 'run', frames: runFrames, frameRate: 12, repeat: -1 });

        const jumpFrames = [];
        for (let i = 8; i <= 13; i++) {
            jumpFrames.push({ key: 'centaur', frame: `frame_${String(i).padStart(3, '0')}` });
        }
        this.anims.create({ key: 'jump', frames: jumpFrames, frameRate: 10, repeat: 0 });

        // Centaur
        this.centaur = this.add.sprite(180, GROUND_Y, 'centaur', 'frame_000');
        this.centaur.setScale(0.28);
        this.centaur.setOrigin(0.45, 0.85);
        this.centaur.play('run');

        this.centaurVelocityY = 0;
        this.centaurY = GROUND_Y;
        this.isJumping = false;
        this.canDoubleJump = false;
        this.hasDoubleJumped = false;
        this.jumpHoldTime = 0;
        this.isHoldingJump = false;

        // Obstacles
        this.obstacles = [];
        this.nextObstacleTime = 2500;
        // Low obstacles (single jump)
        this.lowObstacles = [
            { key: 'obs_boulder', scale: 0.25, hitW: 50, hitH: 45 },
            { key: 'obs_logpile', scale: 0.30, hitW: 50, hitH: 45 },
            { key: 'obs_log', scale: 0.25, hitW: 60, hitH: 30 },
            { key: 'obs_mossylog', scale: 0.25, hitW: 55, hitH: 30 },
        ];
        // Tall obstacles (need double jump)
        this.tallObstacles = [
            { key: 'obs_fence', scale: 0.35, hitW: 70, hitH: 55 },
            { key: 'obs_fence_broken', scale: 0.35, hitW: 60, hitH: 50 },
        ];

        // Dust
        this.dustParticles = [];

        // UI
        this.scoreText = this.add.text(GAME_W - 16, 16, 'Score: 0', {
            fontSize: '24px', fontFamily: 'Georgia, serif', color: '#ffffff',
            fontStyle: 'bold', stroke: '#000000', strokeThickness: 3
        }).setOrigin(1, 0);

        this.highScoreText = this.add.text(GAME_W - 16, 46, `Best: ${this.highScore}`, {
            fontSize: '16px', fontFamily: 'Georgia, serif', color: '#C4A882',
            stroke: '#000000', strokeThickness: 2
        }).setOrigin(1, 0);

        this.speedMultiplier = 1;

        // Mobile-friendly instructions
        const isMobile = this.sys.game.device.os.android || this.sys.game.device.os.iOS ||
                         this.sys.game.device.os.iPad || ('ontouchstart' in window);
        const instrText = isMobile
            ? 'TAP to Jump!\nHold longer = jump higher\nDouble-tap for double jump'
            : 'SPACE to Jump! Hold for higher\nDouble-tap for double jump';

        this.instructionText = this.add.text(GAME_W / 2, GAME_H / 2 - 80, instrText, {
            fontSize: '24px', fontFamily: 'Georgia, serif', color: '#ffffff',
            fontStyle: 'bold', stroke: '#000000', strokeThickness: 4, align: 'center',
            lineSpacing: 6
        }).setOrigin(0.5).setAlpha(0.9);

        this.time.delayedCall(3000, () => {
            this.tweens.add({ targets: this.instructionText, alpha: 0, duration: 600 });
        });

        // --- Music ---
        this.music = this.sound.add('music', { loop: true, volume: 0.4 });
        this.sfxJump = this.sound.add('sfx_jump', { volume: 0.5 });
        this.sfxGameover = this.sound.add('sfx_gameover', { volume: 0.6 });
        this.sfxImpact = this.sound.add('sfx_impact', { volume: 0.7 });
        this.isMuted = localStorage.getItem('centaur_muted') === 'true';

        // Mute button (top-left)
        this.muteBtn = this.add.text(16, 16, this.isMuted ? 'MUTED' : 'MUSIC', {
            fontSize: '18px', fontFamily: 'Georgia, serif',
            color: this.isMuted ? '#666666' : '#C4A882',
            stroke: '#000000', strokeThickness: 3,
            padding: { x: 8, y: 4 }
        }).setInteractive({ useHandCursor: true }).setDepth(100);

        this.muteBtn.on('pointerdown', (pointer) => {
            pointer.event.stopPropagation();
            this.toggleMute();
        });

        // Start music on first interaction (browsers require user gesture)
        this.musicStarted = false;
        this.input.once('pointerdown', () => this.startMusic());

        // --- Input: unified touch + keyboard ---
        // Pointer (touch/mouse) down = start jump
        this.input.on('pointerdown', () => this.onJumpStart());
        this.input.on('pointerup', () => this.onJumpRelease());

        // Keyboard
        this.spaceBar = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        this.upKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP);

        this.gameOverGroup = this.add.group();
    }

    startMusic() {
        if (!this.musicStarted) {
            this.musicStarted = true;
            if (!this.isMuted) {
                this.music.play();
            }
        }
    }

    toggleMute() {
        this.isMuted = !this.isMuted;
        localStorage.setItem('centaur_muted', String(this.isMuted));
        this.muteBtn.setText(this.isMuted ? 'MUTED' : 'MUSIC');
        this.muteBtn.setColor(this.isMuted ? '#666666' : '#C4A882');
        if (this.isMuted) {
            this.music.pause();
        } else if (this.musicStarted) {
            this.music.resume();
        }
    }

    onJumpStart() {
        if (this.isGameOver) { this.restartGame(); return; }

        if (!this.isJumping) {
            // First jump
            this.isJumping = true;
            this.centaurVelocityY = JUMP_VELOCITY_MIN;
            this.isHoldingJump = true;
            this.jumpHoldTime = 0;
            this.canDoubleJump = true;
            this.hasDoubleJumped = false;
            this.centaur.play('jump');
            if (!this.isMuted) this.sfxJump.play();
            this.spawnDust(this.centaur.x - 20, GROUND_Y, 6);
        } else if (this.canDoubleJump && !this.hasDoubleJumped) {
            // Double jump mid-air - fixed velocity, no hold boost
            this.hasDoubleJumped = true;
            this.centaurVelocityY = JUMP_VELOCITY_MIN * 0.75;
            this.isHoldingJump = false;
            this.jumpHoldTime = 0;
            this.centaur.play('jump');
            if (!this.isMuted) this.sfxJump.play();
            this.spawnDust(this.centaur.x, this.centaurY, 4);
        }
    }

    onJumpRelease() {
        this.isHoldingJump = false;
    }

    spawnDust(x, y, count) {
        for (let i = 0; i < count; i++) {
            const dust = this.add.circle(
                x + (Math.random() - 0.5) * 30, y + Math.random() * 8,
                2 + Math.random() * 4, 0xC4A882, 0.5
            );
            dust.vx = -1 - Math.random() * 2;
            dust.vy = -Math.random() * 1.5;
            dust.life = 25 + Math.random() * 20;
            this.dustParticles.push(dust);
        }
    }

    spawnObstacle() {
        // Fences start appearing after score 3, become more common as score rises
        const fenceChance = Math.min(0.4, Math.max(0, (this.score - 3) * 0.06));
        const useTall = Math.random() < fenceChance;
        const pool = useTall ? this.tallObstacles : this.lowObstacles;
        const t = Phaser.Utils.Array.GetRandom(pool);
        const obs = this.add.image(GAME_W + 80, GROUND_Y, t.key);
        obs.setScale(t.scale);
        obs.setOrigin(0.5, 1);
        obs.hitW = t.hitW;
        obs.hitH = t.hitH;
        obs.scored = false;
        this.obstacles.push(obs);
    }

    restartGame() {
        if (!this.isMuted && this.musicStarted) this.music.resume();
        this.isGameOver = false;
        this.score = 0;
        this.speedMultiplier = 1;
        this.scoreText.setText('Score: 0');
        this.obstacles.forEach(o => o.destroy());
        this.obstacles = [];
        this.dustParticles.forEach(d => d.destroy());
        this.dustParticles = [];
        this.gameOverGroup.clear(true, true);
        this.centaur.setAlpha(1);
        this.centaurY = GROUND_Y;
        this.centaurVelocityY = 0;
        this.isJumping = false;
        this.canDoubleJump = false;
        this.hasDoubleJumped = false;
        this.isHoldingJump = false;
        this.centaur.play('run');
        this.centaur.y = GROUND_Y;
        this.nextObstacleTime = 0;
    }

    update(time, delta) {
        const dt = delta / 1000;
        const speed = BASE_SCROLL * this.speedMultiplier;

        // Scroll background
        this.bg.tilePositionX += speed / this.bgScaleX;

        if (this.isGameOver) {
            this.speedMultiplier = Math.max(0, this.speedMultiplier - dt * 2);
            return;
        }

        // Keyboard input
        if (Phaser.Input.Keyboard.JustDown(this.spaceBar) || Phaser.Input.Keyboard.JustDown(this.upKey)) {
            this.onJumpStart();
        }
        if (this.spaceBar.isUp && this.upKey.isUp && this.isHoldingJump && !this.input.activePointer.isDown) {
            this.onJumpRelease();
        }

        this.speedMultiplier = 1 + this.score * 0.04;

        // Variable jump height: holding adds more upward velocity
        if (this.isHoldingJump && this.isJumping && this.centaurVelocityY < 0) {
            this.jumpHoldTime += delta;
            const holdFactor = Math.min(this.jumpHoldTime / HOLD_TIME_FOR_MAX, 1);
            const targetVel = Phaser.Math.Linear(JUMP_VELOCITY_MIN, JUMP_VELOCITY_MAX, holdFactor);
            if (this.centaurVelocityY > targetVel) {
                this.centaurVelocityY = targetVel;
            }
        }

        // Centaur physics
        if (this.isJumping) {
            this.centaurVelocityY += GRAVITY * dt;
            this.centaurY += this.centaurVelocityY * dt;
            // Ceiling clamp - don't fly off screen
            if (this.centaurY < 80) {
                this.centaurY = 80;
                this.centaurVelocityY = 0;
                this.isHoldingJump = false;
            }
            if (this.centaurY >= GROUND_Y) {
                this.centaurY = GROUND_Y;
                this.centaurVelocityY = 0;
                this.isJumping = false;
                this.canDoubleJump = false;
                this.hasDoubleJumped = false;
                this.isHoldingJump = false;
                this.centaur.play('run');
                this.spawnDust(this.centaur.x, GROUND_Y, 8);
            }
        } else if (Math.random() < 0.1) {
            this.spawnDust(this.centaur.x - 30, GROUND_Y + 2, 1);
        }
        this.centaur.y = this.centaurY;

        // Dust
        for (let i = this.dustParticles.length - 1; i >= 0; i--) {
            const d = this.dustParticles[i];
            d.x += d.vx; d.y += d.vy; d.life--;
            d.alpha = d.life / 45;
            if (d.life <= 0) { d.destroy(); this.dustParticles.splice(i, 1); }
        }

        // Obstacles
        if (time > this.nextObstacleTime) {
            this.spawnObstacle();
            this.nextObstacleTime = time + (1400 + Math.random() * 1600) / this.speedMultiplier;
        }

        for (let i = this.obstacles.length - 1; i >= 0; i--) {
            const obs = this.obstacles[i];
            obs.x -= speed;

            if (!obs.scored && obs.x < this.centaur.x - 40) {
                obs.scored = true;
                this.score++;
                this.scoreText.setText(`Score: ${this.score}`);
                if (!this.isMuted) this.sfxJump.play({ volume: 0.3, rate: 1.3 });
            }

            // Tight collision
            const cL = this.centaur.x - 10, cR = this.centaur.x + 15;
            const cT = this.centaurY - 70, cB = this.centaurY - 5;
            const oL = obs.x - obs.hitW * 0.35, oR = obs.x + obs.hitW * 0.35;
            const oT = GROUND_Y - obs.hitH * 0.8, oB = GROUND_Y;

            if (cR > oL && cL < oR && cB > oT && cT < oB) this.gameOver();
            if (obs.x < -100) { obs.destroy(); this.obstacles.splice(i, 1); }
        }
    }

    gameOver() {
        this.isGameOver = true;
        this.centaur.stop();
        this.centaur.setAlpha(0.6);
        this.music.pause();
        if (!this.isMuted) {
            this.sfxImpact.play();
            this.time.delayedCall(400, () => { if (!this.isMuted) this.sfxGameover.play(); });
        }

        // Update high score
        if (this.score > this.highScore) {
            this.highScore = this.score;
            localStorage.setItem('centaur_hs', String(this.highScore));
            this.highScoreText.setText(`Best: ${this.highScore}`);
        }

        const overlay = this.add.rectangle(GAME_W/2, GAME_H/2, GAME_W, GAME_H, 0x000000, 0.4);
        const panel = this.add.rectangle(GAME_W/2, GAME_H/2, 320, 220, 0x1a1a2e, 0.9)
            .setStrokeStyle(2, 0xC4A882);
        const t1 = this.add.text(GAME_W/2, GAME_H/2 - 60, 'GAME OVER', {
            fontSize: '36px', fontFamily: 'Georgia, serif', color: '#C4A882', fontStyle: 'bold'
        }).setOrigin(0.5);
        const t2 = this.add.text(GAME_W/2, GAME_H/2 - 10, `Score: ${this.score}`, {
            fontSize: '28px', fontFamily: 'Georgia, serif', color: '#ffffff'
        }).setOrigin(0.5);
        const t3 = this.add.text(GAME_W/2, GAME_H/2 + 25, `Best: ${this.highScore}`, {
            fontSize: '20px', fontFamily: 'Georgia, serif', color: '#C4A882'
        }).setOrigin(0.5);
        const t4 = this.add.text(GAME_W/2, GAME_H/2 + 70, 'Tap or SPACE to restart', {
            fontSize: '16px', fontFamily: 'Georgia, serif', color: '#999999'
        }).setOrigin(0.5);

        this.gameOverGroup.addMultiple([overlay, panel, t1, t2, t3, t4]);
    }
}

new Phaser.Game({
    type: Phaser.AUTO,
    width: GAME_W,
    height: GAME_H,
    backgroundColor: '#1a1a2e',
    scene: GameScene,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    input: {
        activePointers: 2  // support multi-touch for double jump
    }
});
</script>
</body>
</html>
